name: reperi_garage
description: "Reperi Garage - Vehicle Service Booking App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  ## SUPABASE
  supabase_flutter: ^2.5.6

  ## CAROUSEL
  carousel_slider: ^5.1.1

  ## SHIMMER
  shimmer: ^3.0.0

  ## IMAGE PICKER
  image_picker: ^1.1.2

  
  url_launcher: ^6.2.5

  geolocator: ^14.0.2
  
  geocoding: ^4.0.0
  razorpay_flutter: ^1.4.5

  ## PUSH NOTIFICATIONS
  onesignal_flutter: ^5.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 21